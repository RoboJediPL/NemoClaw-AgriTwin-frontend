apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: agritwin-apps
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: agritwin/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: INTERNAL_ARTIFACT_ONLY
          valueFrom:
            configMapKeyRef:
              name: frontend-config
              key: internalArtifactOnly